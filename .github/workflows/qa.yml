name: ✅ Auto-merge — Merge when all checks pass

# Monitors PR review submissions and merges automatically when:
#   - All reviews are APPROVED
#   - No reviews are in CHANGES_REQUESTED state
#
# Uses squash merge to keep main history clean.
# The linked issue is closed automatically by GitHub via "Closes #N" in the PR body.

on:
  pull_request_review:
    types: [submitted]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  auto-merge:
    name: Merge if all reviews approved
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Auto-merge if all reviews approved
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull request context — skipping.');
              return;
            }

            // Fetch the latest review state for this PR
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });

            // Build a map of the latest review state per reviewer
            // (reviewers can re-submit, so only the latest state counts)
            const latestByReviewer = new Map();
            for (const review of reviews.data) {
              if (review.state !== 'COMMENTED') {
                latestByReviewer.set(review.user.login, review.state);
              }
            }

            const states = Array.from(latestByReviewer.values());
            const hasChangesRequested = states.some(s => s === 'CHANGES_REQUESTED');
            const hasApproval = states.some(s => s === 'APPROVED');

            if (hasChangesRequested) {
              core.info(`PR #${pr.number}: changes requested — skipping merge.`);
              return;
            }

            if (!hasApproval) {
              core.info(`PR #${pr.number}: no approvals yet — skipping merge.`);
              return;
            }

            core.info(`PR #${pr.number}: all reviews approved — merging.`);

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: 'squash'
            });

            core.notice(`✅ PR #${pr.number} merged successfully.`);
