name: 🧪 QA Agent

# Triggered automatically on every PR open/update.
# Detects project type, runs available tests, and performs AI analysis of coverage.

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: qa-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  qa:
    name: AI QA & Test Analysis
    if: |
      !contains(github.event.pull_request.labels.*.name, 'skip-qa') &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read
      checks: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # ── Optional: Setup runtimes based on project type ───────────────────
      # Node.js is pre-installed. Uncomment below for .NET or Java projects.
      # - name: Setup .NET
      #   uses: actions/setup-dotnet@v4
      #   with:
      #     dotnet-version: "8.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "agents/qa/requirements.txt"

      - name: Install agent dependencies
        run: pip install -r agents/qa/requirements.txt

      - name: Run QA Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ vars.AI_MODEL || 'gpt-4o' }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL || 'https://api.openai.com/v1' }}
          AI_MAX_TOKENS: ${{ vars.AI_MAX_TOKENS || '4096' }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: python agents/qa/agent.py
