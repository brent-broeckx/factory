name: 🔒 Security Agent

# Triggered automatically on every PR open/update.
# Scans for secrets, OWASP Top 10 vulnerabilities, and unsafe patterns.
# Will request changes on critical/high severity findings.

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: security-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  security:
    name: AI Security Scan
    if: |
      !contains(github.event.pull_request.labels.*.name, 'skip-security') &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read
      security-events: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "agents/security/requirements.txt"

      - name: Install agent dependencies
        run: pip install -r agents/security/requirements.txt

      - name: Run Security Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ vars.AI_MODEL || 'gpt-4o' }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL || 'https://api.openai.com/v1' }}
          AI_MAX_TOKENS: ${{ vars.AI_MAX_TOKENS || '4096' }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: python agents/security/agent.py
