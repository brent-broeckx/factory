name: 🏷️ Label Manager

# Marks the linked issue as 'done' and closes it when a PR is merged.

on:
  pull_request:
    types: [closed]

jobs:
  mark-done:
    name: Mark issue as done after PR merge
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: read

    steps:
      - name: Find and close linked issue
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';
            const match = prBody.match(/(?:Resolves|Closes|Fixes)\s+#(\d+)/i);
            if (!match) {
              core.info('No linked issue found in PR body.');
              return;
            }

            const issueNumber = parseInt(match[1]);

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['done'],
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed',
              state_reason: 'completed',
            });

            core.notice(`Closed issue #${issueNumber} as done`);