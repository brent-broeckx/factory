name: 🏷️ Label Manager

# Handles two things:
#   1. Auto-labels human-created issues as 'ready' so the Developer Agent picks them up
#      (only for issues NOT generated by the bootstrap planner)
#   2. Labels completed PRs/issues as 'done' after merge

on:
  issues:
    types: [opened]
  pull_request:
    types: [closed]

jobs:
  # ── Auto-label human issues as ready ──────────────────────────────────────
  auto-ready:
    name: Auto-label human issue as ready
    if: |
      github.event_name == 'issues' &&
      github.event.action == 'opened' &&
      github.event.issue.user.type != 'Bot' &&
      !contains(github.event.issue.labels.*.name, 'bootstrap') &&
      !contains(github.event.issue.labels.*.name, 'draft') &&
      !contains(github.event.issue.labels.*.name, 'ai-generated')
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: Apply ready label to human issue
        uses: actions/github-script@v7
        with:
          script: |
            // Ensure the label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'ready',
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'ready',
                color: '22c55e',
                description: 'Issue is approved for AI development',
              });
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['ready'],
            });
            core.notice(`Applied 'ready' label to issue #${context.issue.number}`);

  # ── Mark linked issue as 'done' when PR is merged ─────────────────────────
  mark-done:
    name: Mark issue as done after PR merge
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'ai-generated')
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: read

    steps:
      - name: Find and close linked issue
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';
            const match = prBody.match(/(?:Resolves|Closes|Fixes)\s+#(\d+)/i);
            if (!match) {
              core.info('No linked issue found in PR body.');
              return;
            }

            const issueNumber = parseInt(match[1]);
            core.info(`Found linked issue #${issueNumber}`);

            // Ensure done label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'done',
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'done',
                color: '6366f1',
                description: 'Issue is complete and merged',
              });
            }

            // Remove review label, add done label
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                name: 'review',
              });
            } catch {}

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['done'],
            });

            core.notice(`Marked issue #${issueNumber} as done`);
