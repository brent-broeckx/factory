name: 🧠 Bootstrap — Plan project from issue

# HOW THIS WORKS:
# The compiled planner.lock.yml is a native GitHub Actions workflow generated by
# gh aw compile. The bootstrap workflow dispatches it with the issue context as
# inputs. copilot-requests: write allows Copilot to act without a separate secret.

on:
  issues:
    types: [labeled]

concurrency:
  group: bootstrap-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  plan:
    name: Trigger gh-aw planner workflow
    if: github.event.label.name == 'bootstrap'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      pull-requests: write
      actions: write

    steps:
      - name: Mark issue as in-progress and remove bootstrap label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['in-progress']
            });
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              name: 'bootstrap'
            }).catch(() => {});

      - name: Dispatch planner workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'planner.lock.yml',
              ref: 'main',
              inputs: {
                issue_number: String(context.payload.issue.number),
                issue_title:  context.payload.issue.title,
                issue_body:   context.payload.issue.body  || '',
                issue_url:    context.payload.issue.html_url,
                repo:         context.repo.owner + '/' + context.repo.repo
              }
            });