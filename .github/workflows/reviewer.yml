name: 🔍 Review — Run all review agents on PR

# HOW THIS WORKS:
# Copilot is requested as a PR reviewer via the GitHub API (requestReviewers).
# When reviewing, Copilot reads .github/agents/*.agent.md files as review personas.
# Each .agent.md file gives Copilot a specific review focus:
#   security.agent.md    — OWASP Top 10, secrets, injection vulnerabilities
#   qa.agent.md          — test coverage, correctness against issue requirements
#   code-quality.agent.md — readability, architecture, documentation
# This is intentionally NOT using gh-aw — native Copilot PR review is correct here.
# This is also NOT the coding agent — reviewers do not write or push code.
#
# Skip labels bypass this workflow per-PR:
#   skip-ai-review — skip the code quality review
#   skip-qa        — skip the QA review
#   skip-security  — skip the security review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true # Cancel previous run if PR is updated

jobs:
  assign-reviewers:
    name: Request Copilot review
    if: |
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Request review from Copilot agents
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Request Copilot code review — this triggers the review agents
            // defined in .github/agents/ (security, QA, and code quality).
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              reviewers: ['copilot']
            });
