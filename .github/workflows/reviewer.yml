name: 🔍 Reviewer Agent

# Triggered automatically on every PR open/update.
# Reviews code quality, architecture, and correctness.
# Approves or requests changes — which feeds back into the developer fix loop.

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: reviewer-${{ github.event.pull_request.number }}
  cancel-in-progress: true # Cancel previous review if PR is updated

jobs:
  review:
    name: AI Code Review
    if: |
      !contains(github.event.pull_request.labels.*.name, 'skip-ai-review') &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "agents/reviewer/requirements.txt"

      - name: Install agent dependencies
        run: pip install -r agents/reviewer/requirements.txt

      - name: Run Reviewer Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ vars.AI_MODEL || 'gpt-4o' }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL || 'https://api.openai.com/v1' }}
          AI_MAX_TOKENS: ${{ vars.AI_MAX_TOKENS || '4096' }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: python agents/reviewer/agent.py
