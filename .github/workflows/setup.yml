name: 🔧 Auto Setup — Create labels

# Runs once when the repo is created from the template, or manually via workflow_dispatch.
on:
  create:
  workflow_dispatch:

jobs:
  setup:
    # Only run on the default branch to avoid firing on every new branch.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'create' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: Create labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          create_label() {
            local name="$1" color="$2" description="$3"
            if gh api "repos/$REPO/labels/$name" &>/dev/null 2>&1; then
              gh api --method PATCH "repos/$REPO/labels/$name" \
                --field color="$color" \
                --field description="$description" \
                --silent
              echo "  ↻ Updated: $name"
            else
              gh api --method POST "repos/$REPO/labels" \
                --field name="$name" \
                --field color="$color" \
                --field description="$description" \
                --silent
              echo "  + Created: $name"
            fi
          }

          echo "→ Creating labels..."
          create_label "bootstrap"      "d73a4a" "Triggers the Planner Agent to decompose this into sub-issues"
          create_label "draft"          "cfd3d7" "AI-generated issue awaiting human review"
          create_label "ready"          "0e8a16" "Approved for AI development"
          create_label "in-progress"    "e4a505" "Developer Agent is implementing"
          create_label "review"         "0075ca" "PR open, under agent review"
          create_label "done"           "6f42c1" "Merged and complete"
          create_label "ai-generated"   "8b5cf6" "Created by an AI agent"
          create_label "needs-human"    "b60205" "Fix loop exhausted — human input required"
          create_label "skip-ai-review" "2d3748" "Skip code review agent for this PR"
          create_label "skip-qa"        "2d3748" "Skip QA agent for this PR"
          create_label "skip-security"  "2d3748" "Skip security agent for this PR"
          create_label "security-passed"    "22c55e" "Security review passed"
          create_label "security-needs-fix" "f59e0b" "Security review found warnings"
          create_label "security-blocked"   "b60205" "Security review found critical issues"
          create_label "qa-passed"          "22c55e" "QA review passed"
          create_label "qa-needs-fix"       "f59e0b" "QA review found coverage gaps"
          create_label "qa-blocked"         "b60205" "QA review found critical gaps"
          create_label "quality-passed"     "22c55e" "Code quality review passed"
          create_label "quality-needs-fix"  "f59e0b" "Code quality review found issues"
          create_label "quality-blocked"    "b60205" "Code quality review found blockers"
          create_label "blocked"            "b60205" "PR blocked — critical issues must be resolved"
          echo "✓ Labels ready"
