name: 🔧 Initial Setup

# Run this ONCE after creating your repository from the template.
# Creates all required labels in the correct colors.
# Trigger: Actions tab → "Initial Setup" → Run workflow

on:
  workflow_dispatch:

jobs:
  setup:
    name: Create required labels and validate configuration
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: Create all required labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'bootstrap',      color: 'e11d48', description: 'Triggers the AI Planner Agent to generate architecture and issues' },
              { name: 'draft',          color: '94a3b8', description: 'AI-generated issue awaiting human review before development starts' },
              { name: 'ready',          color: '22c55e', description: 'Approved for AI development — Developer Agent will pick this up' },
              { name: 'in-progress',    color: 'f59e0b', description: 'AI Developer Agent is currently implementing this' },
              { name: 'review',         color: '3b82f6', description: 'PR is open and under AI review' },
              { name: 'done',           color: '6366f1', description: 'Issue is complete and merged' },
              { name: 'ai-generated',   color: '8b5cf6', description: 'Issue or PR was generated by an AI agent' },
              { name: 'needs-human',    color: 'ef4444', description: 'Requires human intervention — max auto-fix attempts reached' },
              { name: 'skip-ai-review', color: '64748b', description: 'Skip the AI code reviewer for this PR' },
              { name: 'skip-qa',        color: '64748b', description: 'Skip the AI QA agent for this PR' },
              { name: 'skip-security',  color: '64748b', description: 'Skip the AI security scanner for this PR' },
            ];

            let created = 0;
            let skipped = 0;

            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label,
                });
                core.info(`✅ Created: ${label.name}`);
                created++;
              } catch (e) {
                if (e.status === 422) {
                  core.info(`⏭️  Already exists: ${label.name}`);
                  skipped++;
                } else {
                  core.error(`❌ Failed to create ${label.name}: ${e.message}`);
                }
              }
            }

            core.notice(`Setup complete. Created ${created} labels, ${skipped} already existed.`);

      - name: Validate secrets are configured
        uses: actions/github-script@v7
        with:
          script: |
            // We can't read secret values, but we can check the AI_API_KEY secret exists
            // by attempting a simple API call structure check
            core.info('');
            core.info('📋 POST-SETUP CHECKLIST:');
            core.info('');
            core.info('Secrets (Settings → Secrets and variables → Actions → Secrets):');
            core.info('  □ AI_API_KEY   — Your OpenAI / compatible API key');
            core.info('  □ DEPLOY_TOKEN — (optional) Deployment credentials');
            core.info('');
            core.info('Variables (Settings → Secrets and variables → Actions → Variables):');
            core.info('  □ AI_MODEL     — Model name (default: gpt-4o)');
            core.info('  □ AI_BASE_URL  — API base URL (default: https://api.openai.com/v1)');
            core.info('  □ AI_MAX_TOKENS— Token limit per call (default: 4096)');
            core.info('  □ MAX_FIX_ITERATIONS — Max auto-fix loops (default: 3)');
            core.info('  □ DEPLOY_ENABLED     — Set to "true" to enable auto-deploy on release');
            core.info('');
            core.info('Branch protection (Settings → Branches → Add rule for "main"):');
            core.info('  □ Require status checks to pass before merging');
            core.info('  □ Select: AI Code Review, AI QA, AI Security Scan');
            core.info('  □ Enable auto-merge on the repository (Settings → General → Auto-merge)');
            core.info('');
            core.notice('See docs/GUIDANCE.md for complete setup instructions.');
