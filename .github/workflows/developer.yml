name: 🛠️ Develop — Implement ready issue

# HOW THIS WORKS:
# Copilot coding agent is assigned to the issue via the GitHub API.
# Copilot reads .github/copilot-instructions.md for project context and conventions.
# It creates a branch, writes code, and opens a PR autonomously.
# It does NOT read .github/agents/*.agent.md — those are for PR code review only.
# It does NOT interact with the GitHub API (no issue creation, no label changes).
#
# Human-gated: development never starts unless a human adds the 'ready' label.

on:
  issues:
    types: [labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.ref }}
  cancel-in-progress: false

jobs:
  implement:
    name: Assign to Copilot coding agent
    if: github.event.label.name == 'ready'
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write
      contents: read

    steps:
      - name: Assign issue to Copilot
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Assign to Copilot — triggers the coding agent.
            // Copilot reads .github/copilot-instructions.md for conventions.
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              assignees: ['copilot']
            });

            // Mark as in-progress so humans know implementation has started
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['in-progress']
            });

            // Remove ready label so this workflow doesn't re-trigger
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              name: 'ready'
            }).catch(() => {}); // ignore if label was already removed
