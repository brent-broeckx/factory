name: 🛠️ Developer Agent

# Triggered in two scenarios:
#   1. A human applies the 'ready' label to an issue  → implements the feature
#   2. A reviewer requests changes on an AI-generated PR → auto-fixes the PR
#
# Human-gated: development never starts unless a human adds the 'ready' label.

on:
  issues:
    types: [labeled]
  pull_request_review:
    types: [submitted]

concurrency:
  # Prevent simultaneous runs on the same issue or PR
  group: developer-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  implement:
    name: Implement Issue or Fix Review Comments
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'ready') ||
      (
        github.event_name == 'pull_request_review' &&
        github.event.review.state == 'changes_requested' &&
        contains(github.event.pull_request.labels.*.name, 'ai-generated')
      )
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "agents/developer/requirements.txt"

      - name: Install agent dependencies
        run: pip install -r agents/developer/requirements.txt

      - name: Run Developer Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ vars.AI_MODEL || 'gpt-4o' }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL || 'https://api.openai.com/v1' }}
          AI_MAX_TOKENS: ${{ vars.AI_MAX_TOKENS || '8192' }}
          TRIGGER_EVENT: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          REPO_FULL_NAME: ${{ github.repository }}
          # Cost control: max automated fix attempts before requiring human
          MAX_FIX_ITERATIONS: ${{ vars.MAX_FIX_ITERATIONS || '3' }}
        run: python agents/developer/agent.py
