# Agent Configuration
# ==================
# Controls AI model selection, token limits, and cost safeguards.
# Override individual values using GitHub Repository Variables
# (Settings → Secrets and variables → Actions → Variables).

ai:
  # AI provider settings
  # Compatible with any OpenAI-compatible API endpoint.
  model: "gpt-4o"               # Override: AI_MODEL variable
  base_url: "https://api.openai.com/v1"  # Override: AI_BASE_URL variable
  temperature: 0.1              # Low temperature for consistent, deterministic output

  # Per-call token limits (cost control)
  max_tokens:
    planner: 4096               # Planning calls: architecture + issue generation
    developer: 8192             # Implementation calls: full file contents
    reviewer: 4096              # Code review calls
    qa: 4096                    # QA analysis calls
    security: 4096              # Security scan calls

  # Override all max_tokens with a single variable: AI_MAX_TOKENS

cost_control:
  # Maximum number of automated fix attempts before requiring human intervention.
  # Once reached, the PR receives the 'needs-human' label and the loop stops.
  # Override: MAX_FIX_ITERATIONS variable
  max_fix_iterations: 3

  # Maximum number of files included in a diff for reviewer/QA/security analysis.
  # Files beyond this limit are skipped (with a note in the comment).
  max_files_per_review: 20

  # Maximum characters of a single file patch included in AI context.
  max_patch_chars: 3000

  # Maximum characters of a single file content sent to the developer agent.
  max_file_content_chars: 6000

  # Maximum items in the repository structure tree sent as context.
  max_repo_tree_items: 80

agents:
  planner:
    # How deep to explore the repo tree for context (0 = root only)
    repo_tree_depth: 3

  developer:
    # Branch name prefix for AI-generated branches
    branch_prefix: "feature"
    # Git commit author for AI commits
    git_author_name: "github-actions[bot]"
    git_author_email: "github-actions[bot]@users.noreply.github.com"

  reviewer:
    # Verdicts that trigger the developer fix loop
    blocking_verdicts:
      - "REQUEST_CHANGES"

  security:
    # Severity levels that block the PR (trigger REQUEST_CHANGES)
    blocking_severities:
      - "critical"
      - "high"
    # Always block if pre-scan detects hardcoded secrets
    block_on_secrets: true
