# Project Configuration
# ======================
# Read by Copilot agents for context when implementing issues.
# Fill this in when using the template for a real project.
# No AI provider configuration lives here — Copilot is used natively.

project:
  name: ""
  description: ""

tech_stack:
  language: ""           # e.g. TypeScript, Python, Go, C#
  framework: ""          # e.g. Next.js, FastAPI, ASP.NET Core, Gin
  database: ""           # e.g. PostgreSQL, MongoDB, none
  runtime: ""            # e.g. Node.js 20, Python 3.12, .NET 8
  package_manager: ""    # e.g. npm, pnpm, pip, go mod

conventions:
  branch_prefix: "feat"
  test_framework: ""     # e.g. Jest, Pytest, xUnit, Vitest
  lint_tool: ""          # e.g. ESLint, Ruff, golangci-lint
  style_guide: ""        # e.g. Airbnb, PEP8, standard Go

testing:
  # Test file location pattern
  # Examples: "**/*.test.ts", "tests/", "spec/"
  pattern: ""

  # Minimum coverage threshold (Copilot will aim for this)
  min_coverage_percent: 80

structure:
  # Root directory for source code
  src_dir: "src"

  # Root directory for tests
  test_dir: "tests"

  # Directories Copilot should NOT modify
  protected_paths:
    - ".github/"
    - "prompts/"
    - "config/"
    - "docs/"

deployment:
  target: ""             # e.g. Vercel, AWS Lambda, Docker, GKE
  registry: ""           # e.g. ghcr.io, ECR (if containerized)

  # Available environments (used in release workflow)
  environments:
    - name: production
    - name: staging
